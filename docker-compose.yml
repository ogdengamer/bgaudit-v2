services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - SESSION_TTL_SECONDS=1209600
      - PUBLIC_BASE_URL=https://bgaudit.shire.spurlocks.org
      - WEB_PATH=/app/web
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  redis-data: